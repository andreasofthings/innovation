name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: >
          flutter build web
          --dart-define=OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}
          --dart-define=OAUTH_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }}
          --dart-define=OAUTH_REDIRECT_URL=${{ secrets.OAUTH_REDIRECT_URL }}
          --dart-define=OAUTH_AUTHORIZATION_ENDPOINT=${{ secrets.OAUTH_AUTHORIZATION_ENDPOINT }}
          --dart-define=OAUTH_TOKEN_ENDPOINT=${{ secrets.OAUTH_TOKEN_ENDPOINT }}
          --dart-define=OAUTH_DISCOVERY_URL=${{ secrets.OAUTH_DISCOVERY_URL }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INNOVATIONAPP }}
          projectId: innovationapp
