<!DOCTYPE html>
<html>

<head>
    <title>Logging out...</title>
</head>

<body>
    <script>
        // Check if we're in a popup or a redirect
        if (window.opener) {
            // Popup
            window.opener.postMessage(window.location.href, window.location.origin);
            window.close();
        } else {
            // Redirect
            window.location.href = window.location.origin + window.location.pathname.replace('logout-callback.html', 'index.html') + window.location.search;
        }
    </script>
</body>

</html>
